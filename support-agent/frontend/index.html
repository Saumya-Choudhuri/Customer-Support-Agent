<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5;
         display: flex; justify-content: center; padding: 20px; }
  .container { width: 100%; max-width: 700px; display: flex;
               flex-direction: column; height: 95vh; }
  .header { background: #fff; border-radius: 12px 12px 0 0;
            padding: 16px 20px; border-bottom: 1px solid #eee;
            display: flex; align-items: center; gap: 12px; }
  .avatar { width: 36px; height: 36px; background: #e8f4fd;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 18px; }
  .header-info h2 { font-size: 15px; font-weight: 600; }
  .header-info p { font-size: 12px; color: #888; }
  .status-dot { width: 8px; height: 8px; background: #22c55e;
                border-radius: 50%; margin-left: auto; }
  .messages { flex: 1; overflow-y: auto; padding: 20px;
              background: #fff; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px;
         font-size: 14px; line-height: 1.5; }
  .msg.user { background: #0ea5e9; color: #fff;
              align-self: flex-end; border-radius: 12px 12px 2px 12px; }
  .msg.agent { background: #f1f5f9; color: #1e293b;
               align-self: flex-start; border-radius: 12px 12px 12px 2px; }
  .msg.agent.escalated { background: #fef9c3; }
  .msg-meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
  .sources { font-size: 11px; color: #64748b; margin-top: 6px;
             padding-top: 6px; border-top: 1px solid #e2e8f0; }
  .memory-badge { display: inline-block; font-size: 10px;
                  background: #e0f2fe; color: #0369a1;
                  padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
  .typing { align-self: flex-start; background: #f1f5f9;
            padding: 10px 16px; border-radius: 12px; }
  .typing span { display: inline-block; width: 6px; height: 6px;
                 background: #94a3b8; border-radius: 50%; margin: 0 2px;
                 animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
  .input-row { background: #fff; border-radius: 0 0 12px 12px;
               padding: 12px 16px; border-top: 1px solid #eee;
               display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 10px 14px; border: 1px solid #e2e8f0;
                     border-radius: 8px; font-size: 14px; outline: none; }
  input[type=text]:focus { border-color: #0ea5e9; }
  button { background: #0ea5e9; color: #fff; border: none;
           padding: 10px 18px; border-radius: 8px; cursor: pointer;
           font-size: 14px; font-weight: 500; }
  button:hover { background: #0284c7; }
  button:disabled { background: #cbd5e1; cursor: not-allowed; }
  .user-row { display: flex; align-items: center; gap: 8px;
              padding: 8px 0; font-size: 13px; color: #64748b; }
  .user-row input { width: 140px; padding: 4px 10px; border: 1px solid #e2e8f0;
                    border-radius: 6px; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="avatar">💬</div>
    <div class="header-info">
      <h2>Support Agent</h2>
      <p>Powered by local LLM · Memory-enabled</p>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <div class="user-row" style="background:#fff;padding:8px 16px;border-bottom:1px solid #eee">
    <label>User ID:</label>
    <input type="text" id="userId" value="user_001" placeholder="e.g. user_001">
    <button onclick="clearMemory()" style="background:#f1f5f9;color:#475569;
      font-size:12px;padding:4px 10px">Clear memory</button>
  </div>

  <div class="messages" id="messages">
    <div class="msg agent">
      Hi! I'm your support assistant. I remember our previous conversations,
      so feel free to pick up where we left off. How can I help you today?
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="msgInput" placeholder="Type your question..."
           onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let sessionId = null;

function addMessage(text, role, meta = {}) {
  const div = document.createElement('div');
  div.className = `msg ${role}` + (meta.escalated ? ' escalated' : '');
  div.textContent = text;

  if (role === 'agent') {
    const m = document.createElement('div');
    m.className = 'msg-meta';
    if (meta.memoryUsed) {
      m.innerHTML += '<span class="memory-badge">memory used</span> ';
    }
    if (meta.escalated) {
      m.innerHTML += '<span class="memory-badge" style="background:#fde68a;color:#92400e">escalated</span> ';
    }
    if (meta.sources && meta.sources.length > 0) {
      const s = document.createElement('div');
      s.className = 'sources';
      s.textContent = 'Sources: ' + meta.sources.join(', ');
      div.appendChild(s);
    }
    if (m.innerHTML) div.appendChild(m);
  }

  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 999999;
  return div;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  div.id = 'typing';
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 999999;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');
  const msg = input.value.trim();
  if (!msg) return;

  const userId = document.getElementById('userId').value.trim() || 'user_001';
  addMessage(msg, 'user');
  input.value = '';
  btn.disabled = true;
  addTyping();

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: userId,
        message: msg,
        session_id: sessionId
      })
    });
    const data = await res.json();
    sessionId = data.session_id;
    document.getElementById('typing')?.remove();
    addMessage(data.reply, 'agent', {
      sources: data.sources,
      escalated: data.escalated,
      memoryUsed: data.memory_used
    });
  } catch (e) {
    document.getElementById('typing')?.remove();
    addMessage('Connection error. Is the backend running?', 'agent');
  }
  btn.disabled = false;
  input.focus();
}

async function clearMemory() {
  const userId = document.getElementById('userId').value.trim() || 'user_001';
  await fetch(`/memory/${userId}`, { method: 'DELETE' });
  addMessage(`Memory cleared for user ${userId}.`, 'agent');
}
</script>
</body>
</html>
